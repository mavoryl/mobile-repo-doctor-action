name: 'Mobile Repo Doctor'
description: 'Scan a mobile repo for health issues — assets, dependencies, config, structure. Score, findings, and fixes.'
branding:
  icon: 'activity'
  color: 'blue'

inputs:
  api-key:
    description: 'API key for Pro features'
    required: false
    default: ''
  fail-on:
    description: 'Failure policy: none | critical | high | score-below-N'
    required: false
    default: 'high'
  output:
    description: 'Report formats (comma-separated): html, json, or html,json'
    required: false
    default: 'html,json'
  scan-path:
    description: 'Path to the mobile repository'
    required: false
    default: ${{ github.workspace }}
  verbose:
    description: 'Enable verbose output'
    required: false
    default: 'false'
  upload-artifacts:
    description: 'Upload report artifacts'
    required: false
    default: 'true'
  artifact-name:
    description: 'Name for the uploaded artifact'
    required: false
    default: 'repo-doctor-report'

outputs:
  score:
    description: 'Overall health score (0-100)'
    value: ${{ steps.summary.outputs.score }}
  grade:
    description: 'Health grade (A-F)'
    value: ${{ steps.summary.outputs.grade }}
  findings-count:
    description: 'Total number of findings'
    value: ${{ steps.summary.outputs.findings_count }}
  critical-count:
    description: 'Number of critical findings'
    value: ${{ steps.summary.outputs.critical_count }}
  high-count:
    description: 'Number of high findings'
    value: ${{ steps.summary.outputs.high_count }}
  exit-code:
    description: 'Final exit code after policy evaluation'
    value: ${{ steps.summary.outputs.exit_code }}

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'
        cache-dependency-path: ${{ github.action_path }}/../pnpm-lock.yaml

    - name: Install and build
      shell: bash
      working-directory: ${{ github.action_path }}/..
      run: pnpm install --frozen-lockfile && pnpm build

    - name: Run scan
      id: scan
      shell: bash
      working-directory: ${{ github.action_path }}/..
      env:
        REPO_DOCTOR_API_KEY: ${{ inputs.api-key }}
      run: |
        REPORT_DIR="${RUNNER_TEMP}/repo-doctor"
        mkdir -p "$REPORT_DIR"
        VERBOSE_FLAG=""
        if [ "${{ inputs.verbose }}" = "true" ]; then
          VERBOSE_FLAG="--verbose"
        fi
        API_KEY_FLAG=""
        if [ -n "${{ inputs.api-key }}" ]; then
          API_KEY_FLAG="--api-key ${{ inputs.api-key }}"
        fi
        set +e
        pnpm repo-doctor -- scan "${{ inputs.scan-path }}" \
          -f "${{ inputs.output }}" \
          -o "$REPORT_DIR/report" \
          $VERBOSE_FLAG $API_KEY_FLAG
        CLI_EXIT=$?
        set -e
        echo "cli-exit=$CLI_EXIT" >> "$GITHUB_OUTPUT"
        echo "report-dir=$REPORT_DIR" >> "$GITHUB_OUTPUT"

    - name: Generate summary
      id: summary
      shell: bash
      run: |
        node "${{ github.action_path }}/summary.mjs" \
          "${{ steps.scan.outputs.report-dir }}/report.json" \
          "${{ inputs.fail-on }}" \
          "${{ steps.scan.outputs.cli-exit }}"

    - name: Upload artifacts
      if: inputs.upload-artifacts == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ steps.scan.outputs.report-dir }}/report.*
        if-no-files-found: warn
